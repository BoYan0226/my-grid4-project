</main>
<aside class="login-panel" aria-labelledby="login-title">
	<div class="login-panel__brand">
		<span class="login-panel__brand-mark" aria-hidden="true"></span>
		<span>OpenHex</span>
	</div>

	<div class="login-panel__heading">
		<p class="login-panel__eyebrow">AGENT ACCESS</p>
		<h1 id="login-title">欢迎回来</h1>
		<p>手机号快捷登录 · 安全认证</p>
	</div>

	<form class="login-form" novalidate>
		<label for="login-phone">手机号码</label>

		<div class="phone-field">
			<span class="phone-field__icon" aria-hidden="true">☎</span>
			<span class="phone-field__code">+86</span>
			<span class="phone-field__divider" aria-hidden="true"></span>
			<input
				id="login-phone"
				name="phone"
				type="tel"
				inputmode="numeric"
				autocomplete="tel-national"
				maxlength="11"
				placeholder="请输入手机号码"
				aria-describedby="phone-message"
			>
		</div>

		<p id="phone-message" class="login-form__message" aria-live="polite"></p>

		<button class="login-form__submit" type="submit">
			<span>获取验证码</span>
			<span aria-hidden="true">→</span>
		</button>

		<p class="login-form__agreement">
			登录即代表同意
			<a href="#">用户协议</a>、
			<a href="#">隐私政策</a>
			与
			<a href="#">免责声明</a>
		</p>
	</form>
</aside>
